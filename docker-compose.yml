services:
  db:
    # pgvector/pgvector:pgXX is the official image: it's plain Postgres XX
    # with the `vector` extension preinstalled. Drop-in replacement for
    # `postgres:18` — same data layout, same env vars, same pgdata volume.
    image: pgvector/pgvector:pg18
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-criticomida}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-criticomida_secret}
      POSTGRES_DB: ${POSTGRES_DB:-criticomida}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-criticomida}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    # Load every key from backend/.env into the container. ``environment``
    # below only overrides values that need to be computed (DATABASE_URL
    # has to point at the compose-internal hostname ``db``, not whatever
    # the host's ``.env`` says) or have meaningful in-compose defaults.
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-criticomida}:${POSTGRES_PASSWORD:-criticomida_secret}@db:5432/${POSTGRES_DB:-criticomida}
    ports:
      # Host :8002 → container :8000. El 8000 del host queda libre para otros
      # proyectos locales. El frontend apunta a http://localhost:8002.
      - "8002:8000"
    volumes:
      - .:/app

volumes:
  pgdata:
