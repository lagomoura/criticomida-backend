[pytest]
testpaths = tests
pythonpath = .
python_files = test_*.py
asyncio_mode = auto
# SQLAlchemy's async engine + asyncpg bind connections to a specific event
# loop. pytest-asyncio defaults to a per-function loop which invalidates the
# module-level engine across tests. Use a session-scoped loop so the shared
# engine stays usable across the whole integration run.
asyncio_default_fixture_loop_scope = session
asyncio_default_test_loop_scope = session
addopts = -q --tb=short --strict-markers
markers =
    integration: tests that need a real PostgreSQL (RUN_INTEGRATION=1)
