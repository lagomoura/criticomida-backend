name: Chat Evals

# When to run: any PR that touches the chat agent's code, prompts,
# tools, related routers/models, or the eval harness itself. Skipping
# unrelated PRs keeps token spend bounded — the suite hits the real
# Gemini Flash Lite endpoint and is the most expensive check we run.

on:
  pull_request:
    paths:
      - 'app/services/chat/**'
      - 'app/services/chat_service.py'
      - 'app/services/sentiment_service.py'
      - 'app/services/owner_chat_preferences_service.py'
      - 'app/routers/chat.py'
      - 'app/models/chat.py'
      - 'tests/chat/**'
      - 'requirements.txt'
      - 'requirements-dev.txt'
      - 'alembic/**'
      - '.github/workflows/chat-evals.yml'

# Run once at a time per PR; cancel superseded jobs to avoid stacking.
concurrency:
  group: chat-evals-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  evals:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      db:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: criticomida_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/criticomida_test
      RUN_CHAT_EVALS: '1'
      # The chat layer reads CHAT_API_KEY first, then ANTHROPIC_API_KEY.
      # Both are wired so single-secret setups keep working.
      CHAT_API_KEY: ${{ secrets.CHAT_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      # FastAPI/JWT bootstrap. Tests don't validate tokens against this
      # secret; any non-empty value satisfies settings validation.
      JWT_SECRET: ci-only-not-real
      APP_ENV: test
      COOKIE_SECURE: 'false'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run database migrations
        run: alembic upgrade head

      - name: Run chat evals
        # Allow the runner to fail individual cases — the threshold
        # gate below decides whether the job passes overall. Without
        # ``continue-on-error`` a single flaky case stops the workflow
        # before we get a chance to compute the pass-rate.
        continue-on-error: true
        run: |
          pytest tests/chat/evals/ \
            -v --tb=short \
            --junitxml=eval-report.xml

      - name: Enforce 90% pass-rate threshold
        run: python tests/chat/evals/check_threshold.py eval-report.xml 0.9

      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chat-eval-report
          path: eval-report.xml
          retention-days: 14
