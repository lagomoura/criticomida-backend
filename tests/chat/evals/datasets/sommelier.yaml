- id: language_keeps_user_choice_es
  locale: es
  description: Pregunta en español con palabras inglesas mezcladas —
    la respuesta sigue en español.
  user_input: "Buscame algo cool y trendy en Palermo."
  expected:
    tools_called:
      - name: search_dishes
    response_must_contain_any:
      - " el "
      - " la "
      - " te "

# ───────────────────────────────────────────────────────────────────
# 12. Datos que NO surfacean — agente dice "no tengo ese dato" (4)
# ───────────────────────────────────────────────────────────────────

- id: no_data_hours_es
  locale: es
  description: El catálogo no maneja horarios concretos.
  user_input: "¿A qué hora abre Trattoria del Sol?"
  expected:
    response_must_contain_any:
      - "no tengo"
      - "no manejo"
      - "no cuento"
      - "no dispongo"

- id: no_data_price_pesos_es
  locale: es
  description: Sólo price_tier ($/$$/$$$), no precio en pesos. El
    agente debe ser claro en que no maneja monto nominal — varias
    formas son válidas siempre que la respuesta NO invente un valor.
  user_input: "¿Cuánto sale el risotto en pesos exactamente?"
  expected:
    response_must_contain_any:
      - "no tengo"
      - "no manejo"
      - "no cuento"
      - "no sé"
      - "no contamos"
      - "no disponemos"
      - "no tenemos"
      - "no hay un monto"
      - "monto nominal"
      - "no maneja"
      - "no te puedo dar"
      - "no puedo dar"
      - "número exacto"
      - "no es posible"
    response_must_not_contain:
      - "ARS "
      - " pesos."
      - " pesos,"
      - "$1"
      - "$2"
      - "$3"
      - "$4"
      - "$5"
      - "$6"
      - "$7"
      - "$8"
      - "$9"
      - "$0"

- id: no_data_table_now_en
  locale: en
  description: Reservation availability is not real-time. The agent
    should either say it doesn't know or offer to file a reservation
    request — never fabricate a "yes/no" availability answer. Bias
    toward inclusive matches; the model paraphrases this case widely.
  user_input: "Is there a table tonight at 9 pm at Trattoria del Sol?"
  expected:
    response_must_contain_any:
      - "no tengo"
      - "don't have"
      - "doesn't have"
      - "can't"
      - "cannot"
      - "no sé"
      - "request a reservation"
      - "request_reservation"
      - "real-time"
