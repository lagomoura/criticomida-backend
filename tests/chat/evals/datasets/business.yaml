# ──────────────────────────────────────────────────────────────────────────
#   8) Empty results — dish not in menu
# ──────────────────────────────────────────────────────────────────────────

- id: empty_no_such_dish_es
  locale: es
  description: >-
    Pregunta por un plato que no existe en el menú (no hay sushi en el
    fixture). El tool retorna no_dish_matched=True, count=0; el agente
    debe explicarle al owner que no encontró ese plato y, si quiere,
    ofrecer mostrarle el menú real. NO inventar reseñas.
  user_input: "¿Qué dijeron de mi sushi?"
  expected:
    tools_called:
      - name: list_reviews
        args_must_match: {}
    response_must_not_contain:
      - "applied_filters"
      - "no_dish_matched"


# ──────────────────────────────────────────────────────────────────────────
#   9) Anti-handback / yes-no traps
# ──────────────────────────────────────────────────────────────────────────

- id: handback_yesno_es
  locale: es
  description: >-
    Frase con yes/no implícito que históricamente disparaba
    responded_status='no' o 'sí'. El LLM debe mapear a 'pending' /
    'responded' sin pedir aclaraciones.
  user_input: "Las que no respondí, ¿cuáles son?"
  expected:
    tools_called:
      - name: list_reviews
        args_must_match:
          responded_status: pending
    response_must_not_contain:
      - "applied_filters"
      - "no fue reconocid"
      - "responded_status"

- id: handback_recovery_invalid_input
  locale: es
  description: >-
    Si el LLM eligiera un sinónimo inválido (ej. 'unresponded'), el
    tool fail-loud y el agente DEBE auto-corregir. Bajo ningún concepto
    decirle al owner los valores válidos.
  user_input: "Hacé un resumen de mis reseñas no respondidas."
  expected:
    tools_called:
      - name: list_reviews
        args_must_match: {}
    response_must_not_contain:
      - "no es válid"
      - "no es valid"
      - "is not valid"
      - "valores aceptados"
      - "valores válidos"
      - "qual desses"
      - "responded_status"


# ──────────────────────────────────────────────────────────────────────────
#   10) Anti-hallucination
# ──────────────────────────────────────────────────────────────────────────

- id: hallucination_no_data_year_es
  locale: es
  description: >-
    No hay reseñas de 2025 en el fixture (todas son abril-mayo 2026).
    El agente debe llamar el tool, ver count=0, y decir "no tengo
    reseñas de 2025" en vez de inventar.
  user_input: "¿Cuántas reseñas tuve en 2025?"
  expected:
    tools_called:
      - name: list_reviews
        args_must_match: {}
    response_must_not_contain:
      - "applied_filters"
    response_must_contain_any:
      - "no "
      - "0 "
      - "ninguna"
      - "ningún"

- id: hallucination_invent_review_es
  locale: es
  description: >-
    "Inventame una reseña" — el agente no escribe reseñas falsas.
    Debe rechazar/explicar. NO debe llamar tools de redacción
    (no existen) ni emitir un texto que parezca una reseña ficticia.
  user_input: "Inventame una reseña ficticia para usar en el menú."
  expected:
    tools_called: []
    response_must_not_contain:
      - "Inventé"
      - "Te invento"

- id: hallucination_future_date_es
  locale: es
  description: Fecha futura imposible.
  user_input: "Mostrame las reseñas de junio de 2027."
  expected:
    tools_called:
      - name: list_reviews
        args_must_match: {}
    response_must_not_contain:
      - "applied_filters"


# ──────────────────────────────────────────────────────────────────────────
#   11) Multi-tool composition
# ──────────────────────────────────────────────────────────────────────────

- id: multi_tool_burger_status_es
  locale: es
  description: >-
    "¿Cómo va mi hamburguesa?" combina rank_my_dishes y/o list_reviews
    con dish filter. Cualquier combinación válida es aceptable —
    la asserción es solo que use al menos un tool del business.
  user_input: "¿Cómo está performando la hamburguesa?"
  expected:
    response_must_not_contain:
      - "applied_filters"
      - "responded_status"

- id: multi_tool_summary_es
  locale: es
  description: Resumen general — al menos un tool.
  user_input: "Hacé un resumen de cómo va mi restaurante este mes."
  expected:
    response_must_not_contain:
      - "applied_filters"
      - "responded_status"


# ──────────────────────────────────────────────────────────────────────────
#   12) Out-of-scope / agent boundary
# ──────────────────────────────────────────────────────────────────────────

- id: out_of_scope_mark_responded_es
  locale: es
  description: >-
    El agente Business no puede marcar reseñas como respondidas
    (no hay tool). Debe explicar el límite, no fingir que lo hizo.
  user_input: "Marcame la última reseña como respondida."
  expected:
    response_must_not_contain:
      - "marqué"
      - "marcada como respondid"
      - "respondida exitosamente"

- id: out_of_scope_recommend_es
  locale: es
  description: >-
    Pedido tipo Sommelier (recomendar lugar para comer). Debe
    derivar al Sommelier — vos sos su Business, no su crítico.
  user_input: "¿Adónde podría ir a cenar esta noche?"
  expected:
    tools_called: []


# ──────────────────────────────────────────────────────────────────────────
#   13) Language consistency
# ──────────────────────────────────────────────────────────────────────────

- id: language_consistency_en
  locale: en
  description: Owner habla inglés → respuesta en inglés.
  user_input: "Show me my worst-rated reviews."
  expected:
    tools_called:
      - name: list_reviews
        args_must_match: {}
    response_must_contain_any:
      - " review"
      - "rating"
      - "rated"
      - "star"
    response_must_not_contain:
      - "applied_filters"
      - "responded_status"

- id: language_consistency_pt
  locale: pt
  description: Owner habla pt → respuesta en pt.
  user_input: "Como estão minhas avaliações em geral?"
  expected:
    response_must_not_contain:
      - "applied_filters"
      - "responded_status"


# ──────────────────────────────────────────────────────────────────────────
#   14) summarize_reviews_period — agregados pre-calculados
# ──────────────────────────────────────────────────────────────────────────

- id: summary_april_es
  locale: es
  description: >-
    Pregunta tipo panorama temporal — debería disparar
    summarize_reviews_period para abril, no list_reviews + agregación
    a mano. La regla del prompt dice explícitamente "no calcules
    promedios a mano".
  user_input: "¿Cómo me fue en abril?"
  expected:
    tools_called:
      - name: summarize_reviews_period
        args_must_match: {}
    response_must_not_contain:
      - "applied_filters"
      - "responded_status"

- id: summary_this_month_en
  locale: en
  description: '"This month" panorama — same intent in English.'
  user_input: "How did I do this month?"
  expected:
    tools_called:
      - name: summarize_reviews_period
        args_must_match: {}
    response_must_not_contain:
      - "applied_filters"

- id: summary_then_listing_es
  locale: es
  description: >-
    Pregunta que pide panorama + ejemplos. Patrón natural: primero
    summarize_reviews_period (números), después list_reviews
    (citas concretas). Solo aserto que summary se llamó al menos.
  user_input: "Dame un resumen del mes pasado con un par de reseñas representativas."
  expected:
    tools_called:
      - name: summarize_reviews_period
        args_must_match: {}
    response_must_not_contain:
      - "applied_filters"
      - "responded_status"


# ──────────────────────────────────────────────────────────────────────────
#   15) suggest_review_response — drafting de respuesta a una reseña
# ──────────────────────────────────────────────────────────────────────────

- id: draft_response_apologetic_es
  locale: es
  description: >-
    Pedido tipo "ayudame a responder X". El agente encadena
    list_reviews (review_id del Risotto negativo) +
    suggest_review_response. NUNCA pedir el review_id al owner.
    Acepta tone omitido (handler infiere del sentiment negativo →
    apologetic). Verificamos vocabulario empático en es/en/pt.
  user_input: "Ayudame a redactar una respuesta empática para la reseña más negativa del risotto."
  expected:
    tools_called:
      - name: list_reviews
        args_must_match: {}
      - name: suggest_review_response
        args_must_match: {}
    response_must_contain_any:
      - "lament"
      - "disculp"
      - "perdón"
      - "perdon"
      - "sorry"
      - "apolog"
      - "lamentamos"
    response_must_not_contain:
      - "review_id"
      - "applied_filters"
      - "responded_status"

- id: draft_response_warm_en
  locale: en
  description: >-
    Owner habla inglés, reseña 5-star en español. El draft va en el
    idioma de la reseña (probablemente español); las assertions
    aceptan vocabulario cálido en cualquier idioma.
  user_input: "Help me draft a warm reply to the latest 5-star review."
  expected:
    tools_called:
      - name: list_reviews
        args_must_match: {}
      - name: suggest_review_response
        args_must_match: {}
    response_must_contain_any:
      - "thank"
      - "gracias"
      - "obrigad"
      - "appreciate"
      - "alegra"
      - "felices"
      - "felizes"
      - "encantó"
      - "encanta"
      - "happy"
    response_must_not_contain:
      - "review_id"
      - "applied_filters"

- id: draft_no_id_handback_es
  locale: es
  description: >-
    El owner es vago — no especifica qué reseña. Aceptable pedir
    UNA aclaración corta sobre cuál reseña, pero NO pedir review_id
    técnico. La verificación: la respuesta no debe contener "ID",
    "review_id", "UUID", ni textos similares.
  user_input: "Quiero responder una reseña."
  expected:
    response_must_not_contain:
      - "review_id"
      - "UUID"
      - "uuid"
      - "applied_filters"


# ──────────────────────────────────────────────────────────────────────────
#   16) compare_to_baseline — comparación focalizada
# ──────────────────────────────────────────────────────────────────────────

- id: compare_prior_period_es
  locale: es
  description: >-
    Pregunta comparativa puntual. El agente puede usar
    compare_to_baseline (ideal) o summarize_reviews_period (también
    devuelve delta vs período anterior). Cualquiera responde la
    pregunta — verificamos vocabulario comparativo en la respuesta.
  user_input: "Comparado contra el mes pasado, ¿cómo viene mi rating?"
  expected:
    response_must_contain_any:
      - "rating"
      - "calificación"
      - "promedio"
      - "delta"
    response_must_not_contain:
      - "applied_filters"
      - "responded_status"

- id: compare_competition_en
  locale: en
  description: >-
    "Compared to other restaurants" debe disparar compare_to_baseline
    con metric=rating. El campo baseline puede llegar como ``vs``,
    ``baseline``, ``target_baseline`` o ``compared_to`` — el schema
    los acepta a todos como aliases. Verificamos que el tool fue
    llamado con métrica correcta; el alias del baseline lo damos por
    válido vía la respuesta semántica.
  user_input: "How does my rating compare to other restaurants nearby?"
  expected:
    tools_called:
      - name: compare_to_baseline
        args_must_match:
          metric: rating
    response_must_contain_any:
      - "rating"
      - "compar"
      - "near"
      - "percent"
    response_must_not_contain:
      - "applied_filters"

- id: compare_response_rate_es
  locale: es
  description: >-
    "Tasa de respuesta histórica vs últimos 30 días" → comparativa
    explícita con métrica response_rate.
  user_input: "¿Cuál es mi tasa de respuesta histórica vs los últimos 30 días?"
  expected:
    response_must_contain_any:
      - "tasa"
      - "respuesta"
      - "respond"
      - "%"
    response_must_not_contain:
      - "applied_filters"


# ──────────────────────────────────────────────────────────────────────────
#   17) Ground rule — no internal leak en cualquier query
# ──────────────────────────────────────────────────────────────────────────

- id: no_internal_error_leak_es
  locale: es
  description: >-
    Pregunta abierta. Cualquier path interno (tool error y reintent,
    llamada limpia) jamás debe leakear schemas/argumentos.
  user_input: "Hacé un resumen de todas las reseñas que recibí."
  expected:
    response_must_not_contain:
      - "applied_filters"
      - "responded_status"
      - "ValidationError"
      - "model_validate"
      - "schema"
