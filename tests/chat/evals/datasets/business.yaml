# Eval cases for the Business chat agent.
#
# Schema (see runner.EvalCase): each case asserts behaviour, not data.
# The fixture (see conftest.py::chat_eval_scope) ships:
#   - 4 dishes: Hamburguesa Clásica, Tacos al Pastor, Risotto de Hongos,
#     Tiramisú.
#   - 8 pending reviews + 4 responded.
#   - Dates spread across April–May 2026 (1, 5, 8, 18, 22, 25, 30 days
#     back from a 2026-05-04 anchor).
#   - Sentiments: positive / neutral / negative; ratings 1-5.
#
# Cases reference dishes by name, never by ID. Assertions favour
# tool-call shape over response text — the model phrases freely.
#
# Run with:
#   RUN_CHAT_EVALS=1 pytest tests/chat/evals/ -v

# Common forbidden patterns: anything that means the model leaked
# internals to the owner. Each case redeclares only the relevant ones.
# Reference list:
#   - applied_filters / responded_status / sentiment_label / model_validate
#   - "no fue reconocid", "wasn't recognized", "não foi reconhecid"
#   - "el sistema", "the system", "o sistema"
#   - "schema", "details", "ValidationError"


# ──────────────────────────────────────────────────────────────────────────
#   1) Polyglot lookup — "pending" in 3 languages + variants
# ──────────────────────────────────────────────────────────────────────────

- id: pending_es
  locale: es
  description: Reseñas no respondidas (regression del bug histórico).
  user_input: "¿Qué reseñas todavía no respondí?"
  expected:
    tools_called:
      - name: list_reviews
        args_must_match:
          responded_status: pending
    response_must_not_contain:
      - "responded_status"
      - "applied_filters"
      - "no fue reconocid"
      - "el sistema"

- id: pending_en
  locale: en
  description: Same intent in English.
  user_input: "Which reviews haven't I replied to yet?"
  expected:
    tools_called:
      - name: list_reviews
        args_must_match:
          responded_status: pending
    response_must_not_contain:
      - "responded_status"
      - "applied_filters"
      - "wasn't recognized"
      - "the system"

- id: pending_pt
  locale: pt
  description: Same intent in Portuguese.
  user_input: "Quais reviews eu ainda não respondi?"
  expected:
    tools_called:
      - name: list_reviews
        args_must_match:
          responded_status: pending
    response_must_not_contain:
      - "responded_status"
      - "applied_filters"
      - "não foi reconhecid"
      - "o sistema"

- id: pending_es_alternate
  locale: es
  description: Frase coloquial alternativa para reseñas pendientes.
  user_input: "Mostrame las reseñas que me faltan responder."
  expected:
    tools_called:
      - name: list_reviews
        args_must_match:
          responded_status: pending
    response_must_not_contain:
      - "applied_filters"
      - "responded_status"

- id: pending_en_indirect
  locale: en
  description: Indirect English phrasing — owner doesn't say "pending".
  user_input: "What reviews still need my attention?"
  expected:
    tools_called:
      - name: list_reviews
        args_must_match:
          responded_status: pending
    response_must_not_contain:
      - "applied_filters"
      - "responded_status"


